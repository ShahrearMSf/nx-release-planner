name: NX Release Digest

on:
  schedule:
    # All times UTC. 03:00 UTC = 09:00 Asia/Dhaka (BST, UTC+6, no DST).
    - cron: "0 3 10 * *"                     # 10th of every month
    - cron: "0 3 20 * *"                     # 20th of every month
    - cron: "0 3 31 1,3,5,7,8,10,12 *"       # 31st of 31-day months
    - cron: "0 3 30 4,6,9,11 *"              # 30th of 30-day months
    - cron: "0 3 28 2 *"                     # 28th of February (even in leap years)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print payload instead of posting to Slack"
        required: false
        type: boolean
        default: false
      run_date:
        description: "Override 'today' (ISO date YYYY-MM-DD, e.g. 2026-05-31). Leave EMPTY for today."
        required: false
        type: string
        default: ""

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci || npm install

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          RUN_DATE: ${{ github.event.inputs.run_date }}
          # Optional URL overrides via repo Variables (not secrets).
          # Leave unset to use the defaults in src/config.js.
          FREE_PLUGIN_URL: ${{ vars.FREE_PLUGIN_URL }}
          PRO_CHANGELOG_URL: ${{ vars.PRO_CHANGELOG_URL }}
          PRO_SITE_URL: ${{ vars.PRO_SITE_URL }}
          SUPPORT_FORUM_URL: ${{ vars.SUPPORT_FORUM_URL }}
        run: node src/index.js
